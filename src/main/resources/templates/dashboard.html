<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    .sidebar {
      width: 220px;
      background: #2f2f45;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      margin: 15px 0;
      cursor: pointer;
      opacity: 0.8;
    }

    .sidebar ul li:hover {
      opacity: 1;
    }

    .main {
      flex: 1;
      padding: 40px;
    }

    .header {
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .chart {
      margin-top: 40px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .chart-placeholder {
      height: 200px;
      background: linear-gradient(135deg, #ddd, #bbb);
      border-radius: 8px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user {
      background: #2f2f45;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
    }

  </style>
</head>
<body>

  <div class="sidebar">
    <h2>MyApp</h2>
    <ul>
      <li>Dashboard</li>
      <li>Relatórios</li>
      <li>Configurações</li>
      <li>Sair</li>
    </ul>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="user">Olá, Usuário</div>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Vendas</h3>
        <p>R$ 5.000</p>
      </div>

      <div class="card">
        <h3>Usuários</h3>
        <p>120</p>
      </div>

      <div class="card">
        <h3>Pedidos</h3>
        <p>32</p>
      </div>
    </div>

    <div class="chart">
      <h3>Desempenho</h3>
      <div class="chart-placeholder"></div>
    </div>

  </div>

</body>
</html>
